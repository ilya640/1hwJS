<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2</title>
</head>

<body>
    <script>
        const myTrim = (str) => {
            let start = 0;
            let end = str.length - 1;
            let result = '';
            while (start <= end && str[start] === ' ') {
                start++;
            }
            if (start !== end + 1) {
                while (start <= end && str[end] === ' ') {
                    end--;
                }
            } else {
                return '';
            }

            start === 0 && end === str.length - 1 ?
                (result = str) :
                (result = str.substring(start, end));
            return result;
        };

        let userString = '';
        while (1) {
            userString = prompt('Введите строку');
            if (userString !== null) {
                break;
            } else {
                continue;
            }
        }
        const resultString = myTrim(userString);
        if (resultString === '') {
            alert('Это всё пробелы!');
        } else {
            if (resultString === userString) {
                alert('Строка без пробелов');
            } else {
                alert(`Ваша строка: \$${resultString}\$`);
            }
        }
    </script>
</body>

</html>
