<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANKETA</title>
  </head>
  <body>
    <script>
      let user = '';

      let username = prompt('Введите ваше ФИО');

      while (true) {
        if (username && username.trim() !== '') {
          user += `ваше ФИО: ${username}\n`;
          break;
        } else {
          username = prompt('Введите корректное ФИО');
        }
      }

      let age = prompt('Введите ваш возраст в годах').trim();
      let ageYear = Number(age);

      while (true) {
        if (
          !Number.isNaN(ageYear) &&
          ageYear >= 0 &&
          ageYear <= 200 &&
          age !== ''
        ) {
          user += `ваш возраст в годах: ${ageYear}\n`;
          user += `ваш возраст в днях: ${ageYear * 365}\n`;
          user += `через 5 лет вам будет: ${ageYear + 5}\n`;

          const isMale = confirm('Ваш пол - мужской?');

          user += isMale ? 'ваш пол: мужской\n' : 'ваш пол: женский\n';

          const retirementAge = isMale ? 65 : 60;

          user +=
            ageYear >= retirementAge
              ? 'вы на пенсии: да\n'
              : 'вы на пенсии: нет\n';

          alert(user);
          break;
        } else {
          age = prompt('Введите корректный возраст').trim();
          ageYear = Number(age);
        }
      }
    </script>
  </body>
</html>
