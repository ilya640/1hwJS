<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ANKETA</title>
</head>
<body>

<script>
function runAnketa() {
  let user = "";

  function askNonEmpty(message) {
    let value;

    while (true) {
      value = prompt(message);

      if (value === null) return null;

      value = value.trim();

      if (value !== "") return value;
    }
  }

  function askAge() {
    let value;

    while (true) {
      value = prompt("Введите ваш возраст");

      if (value === null) return null;

      value = value.trim();
      const num = Number(value);

      if (value !== "" && !Number.isNaN(num) && num >= 0 && num <= 200) {
        return num;
      }
    }
  }


  const lastName = askNonEmpty("Введите фамилию");
  if (lastName === null) return;

  const firstName = askNonEmpty("Введите имя");
  if (firstName === null) return;

  const middleName = askNonEmpty("Введите отчество");
  if (middleName === null) return;

  user += `ФИО: ${lastName} ${firstName} ${middleName}\n`;

 
  const ageYear = askAge();
  if (ageYear === null) return;

  user += `возраст: ${ageYear}\n`;
  user += `возраст в днях: ${ageYear * 365}\n`;
  user += `через 5 лет: ${ageYear + 5}\n`;


  const isMale = confirm("Ваш пол - мужской?");
  user += isMale ? "пол: мужской\n" : "пол: женский\n";

 
  const retirementAge = isMale ? 65 : 60;

  user += ageYear >= retirementAge
    ? "вы на пенсии: да\n"
    : "вы на пенсии: нет\n";

  alert(user);
}


runAnketa();
</script>

</body>
</html>
